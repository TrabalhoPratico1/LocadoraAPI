<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Categorias</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="sidebar">
    <h3>Locadora da Gabriela</h3>

    <a href="index.html">Dashboard</a>
    <a href="clientes.html">Clientes</a>
    <a href="veiculos.html">Veículos</a>
    <a href="categorias.html">Categorias</a>
    <a href="fabricantes.html">Fabricantes</a>
    <a href="alugueis.html">Aluguéis</a>
    <a href="relatorios.html">Relatórios</a>
</div>

<div class="content">

    <h1>Categorias</h1>

    <div class="card p-4 mb-4">

        <div class="row">

            <div class="col-md-4">
                <input class="form-control"
                       id="nome"
                       placeholder="Nome">
            </div>

            <div class="col-md-6">
                <input class="form-control"
                       id="descricao"
                       placeholder="Descrição">
            </div>

            <div class="col-md-2">
                <button class="btn btn-primary w-100"
                        id="btnSalvar"
                        onclick="salvarCategoria()">
                    Salvar
                </button>
            </div>

        </div>

    </div>

    <div class="card p-4">

        <table class="table">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Descrição</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody id="tabelaCategorias"></tbody>

        </table>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/categorias.js"></script>

</body>
</html>
