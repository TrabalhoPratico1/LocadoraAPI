<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Aluguéis</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="sidebar">
    <h3>Locadora da Gabriela</h3>

    <a href="index.html">Dashboard</a>
    <a href="clientes.html">Clientes</a>
    <a href="veiculos.html">Veículos</a>
    <a href="categorias.html">Categorias</a>
    <a href="fabricantes.html">Fabricantes</a>
    <a href="alugueis.html">Aluguéis</a>
    <a href="relatorios.html">Relatórios</a>
</div>

<div class="content">

    <h1>Aluguéis</h1>

    <div class="card p-4 mb-4">

        <h4>Novo Aluguel</h4>

        <div class="row">

            <div class="col-md-4">
                <select class="form-select" id="cliente"></select>
            </div>

            <div class="col-md-4">
                <select class="form-select" id="veiculo"></select>
            </div>

            <div class="col-md-2">
                <input type="number"
                       class="form-control"
                       id="valorDiaria"
                       placeholder="Diária">
            </div>

            <div class="col-md-2">
                <button class="btn btn-primary w-100"
                        onclick="salvarAluguel()">
                    Alugar
                </button>
            </div>

        </div>

    </div>

    <div class="card p-4">

        <table class="table table-striped">

            <thead>

                <tr>
                    <th>ID</th>
                    <th>Cliente</th>
                    <th>Veículo</th>
                    <th>Início</th>
                    <th>Devolução</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>

            </thead>

            <tbody id="tabelaAlugueis"></tbody>

        </table>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/alugueis.js"></script>

</body>
</html>
