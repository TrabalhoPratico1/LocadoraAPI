<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locadora da Gabriela</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="sidebar">
    <h3>Locadora da Gabriela</h3>

    <a href="index.html">Dashboard</a>
    <a href="clientes.html">Clientes</a>
    <a href="veiculos.html">Veículos</a>
    <a href="categorias.html">Categorias</a>
    <a href="fabricantes.html">Fabricantes</a>
    <a href="alugueis.html">Aluguéis</a>
    <a href="relatorios.html">Relatórios</a>
</div>

<div class="content">

    <h1>Dashboard</h1>

    <div class="row mt-4">

        <div class="col-md-3">
            <div class="card-dashboard">
                <h5>Total Clientes</h5>
                <h2 id="totalClientes">0</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-dashboard">
                <h5>Total Veículos</h5>
                <h2 id="totalVeiculos">0</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-dashboard">
                <h5>Aluguéis Ativos</h5>
                <h2 id="totalAlugueis">0</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-dashboard">
                <h5>Receita Total</h5>
                <h2 id="receitaTotal">R$ 0,00</h2>
            </div>
        </div>

    </div>

</div>


<script src="js/api.js"></script>

<script>
async function carregarDashboard() {

    // Clientes
    const clientesResponse = await apiFetch('/Clientes');
    const clientes = await clientesResponse.json();

    document.getElementById("totalClientes").innerText =
        clientes.length;


    // Veículos
    const veiculosResponse = await apiFetch('/Veiculos');
    const veiculos = await veiculosResponse.json();

    document.getElementById("totalVeiculos").innerText =
        veiculos.length;

carregarDashboard();

</script>

</body>
</html>
