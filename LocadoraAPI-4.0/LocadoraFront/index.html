<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Locadora de Veículos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top box-shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🚗 LocadoraSys</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link active" href="#" onclick="carregarVeiculos()">Veículos</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="carregarClientes()">Clientes</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-5 pt-5 flex-grow-1">
        <div id="conteudo-principal" class="bg-white p-4 rounded shadow-sm">
            <div class="text-center py-5">
                <h1 class="display-5 fw-bold text-primary">Bem-vindo ao Sistema</h1>
                <p class="lead text-muted">Utilize o menu superior para gerenciar os registros da locadora.</p>
                <p>Selecione <strong>Veículos</strong> para testar os filtros avançados ou <strong>Clientes</strong> para testar a recarga de saldo.</p>
            </div>
        </div>
    </main>

    <footer class="bg-light text-center text-muted py-3 mt-4 border-top">
        <small>Trabalho Prático - Desenvolvimento Full Stack &copy; 2023</small>
    </footer>

    <div class="modal fade" id="modalFormulario" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-light">
                    <h5 class="modal-title" id="modalTitulo">Cadastro/Edição</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modalCorpoFormulario">
                    <div class="text-center"><div class="spinner-border text-primary" role="status"></div></div>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="btnSalvarModal">Salvar Registro</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
