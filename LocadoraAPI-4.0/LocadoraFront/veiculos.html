<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veículos - Locadora Prime</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="sidebar">
   <h3>Locadora da Gabriela</h3>

    <a href="index.html">Dashboard</a>
    <a href="clientes.html">Clientes</a>
    <a href="veiculos.html">Veículos</a>
    <a href="categorias.html">Categorias</a>
    <a href="fabricantes.html">Fabricantes</a>
    <a href="alugueis.html">Aluguéis</a>
    <a href="relatorios.html">Relatórios</a>
</div>

<div class="content">

    <h1>Veículos</h1>

    <div class="card p-4 mb-4">

        <h4>Novo Veículo</h4>

        <div class="row g-2">

            <div class="col-md-2">
                <input class="form-control" id="modelo" placeholder="Modelo">
            </div>

            <div class="col-md-2">
                <input type="number" class="form-control" id="ano" placeholder="Ano">
            </div>

            <div class="col-md-2">
                <input class="form-control" id="placa" placeholder="Placa">
            </div>

            <div class="col-md-2">
                <input type="number" class="form-control" id="quilometragem" placeholder="Quilometragem">
            </div>

            <div class="col-md-2">
                <select class="form-select" id="fabricante"></select>
            </div>

            <div class="col-md-2">
                <select class="form-select" id="categoria"></select>
            </div>

            <div class="col-md-12 mt-3">
                <button class="btn btn-primary"
                        id="btnSalvarVeiculo"
                        onclick="salvarVeiculo()">
                    Salvar
                </button>
            </div>

        </div>

    </div>

    <div class="card p-4 mb-4">

        <h4>Pesquisar</h4>

        <div class="row">

            <div class="col-md-4">
                <input class="form-control"
                       id="filtroModelo"
                       placeholder="Modelo">
            </div>

            <div class="col-md-4">
                <input class="form-control"
                       id="filtroPlaca"
                       placeholder="Placa">
            </div>

            <div class="col-md-2">
                <button class="btn btn-primary w-100"
                        onclick="filtrarVeiculos()">
                    Buscar
                </button>
            </div>

            <div class="col-md-2">
                <button class="btn btn-secondary w-100"
                        onclick="listarVeiculos()">
                    Limpar
                </button>
            </div>

        </div>

    </div>

    <div class="card p-4">

        <table class="table table-striped">

            <thead>

                <tr>
                    <th>ID</th>
                    <th>Modelo</th>
                    <th>Ano</th>
                    <th>Placa</th>
                    <th>KM</th>
                    <th>Fabricante</th>
                    <th>Categoria</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>

            </thead>

            <tbody id="tabelaVeiculos"></tbody>

        </table>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/veiculos.js"></script>

</body>
</html>
