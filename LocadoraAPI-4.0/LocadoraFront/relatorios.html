<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios - Locadora Prime</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="sidebar">
     <h3>Locadora da Gabriela</h3>

    <a href="index.html">Dashboard</a>
    <a href="clientes.html">Clientes</a>
    <a href="veiculos.html">Veículos</a>
    <a href="categorias.html">Categorias</a>
    <a href="fabricantes.html">Fabricantes</a>
    <a href="alugueis.html">Aluguéis</a>
    <a href="relatorios.html">Relatórios</a>
</div>

<div class="content">

    <h1>Relatórios</h1>

    <!-- Veículos por fabricante -->
    <div class="card p-4 mb-4">
        <h4>Veículos por Fabricante</h4>

        <div class="row">
            <div class="col-md-8">
                <input class="form-control"
                       id="fabricanteBusca"
                       placeholder="Nome do fabricante">
            </div>

            <div class="col-md-4">
                <button class="btn btn-primary w-100"
                        onclick="buscarVeiculosFabricante()">
                    Buscar
                </button>
            </div>
        </div>

        <ul class="mt-3" id="resultadoFabricante"></ul>
    </div>

    <!-- Aluguéis ativos -->
    <div class="card p-4 mb-4">

        <h4>Aluguéis Ativos</h4>

        <button class="btn btn-primary mb-3"
                onclick="buscarAlugueisAtivos()">
            Consultar
        </button>

        <ul id="resultadoAtivos"></ul>

    </div>

    <!-- Histórico cliente -->
    <div class="card p-4 mb-4">

        <h4>Histórico do Cliente</h4>

        <div class="row">

            <div class="col-md-8">
                <input class="form-control"
                       id="cpfBusca"
                       placeholder="CPF">
            </div>

            <div class="col-md-4">
                <button class="btn btn-primary w-100"
                        onclick="buscarHistorico()">
                    Buscar
                </button>
            </div>

        </div>

        <ul class="mt-3" id="resultadoHistorico"></ul>

    </div>

    <!-- Veículos disponíveis -->
    <div class="card p-4 mb-4">

        <h4>Veículos Disponíveis por Categoria</h4>

        <div class="row">

            <div class="col-md-8">
                <input class="form-control"
                       id="categoriaBusca"
                       placeholder="Categoria">
            </div>

            <div class="col-md-4">
                <button class="btn btn-primary w-100"
                        onclick="buscarDisponiveis()">
                    Buscar
                </button>
            </div>

        </div>

        <ul class="mt-3" id="resultadoDisponiveis"></ul>

    </div>

    <!-- Faturamento -->
    <div class="card p-4">

        <h4>Faturamento por Cliente</h4>

        <button class="btn btn-primary mb-3"
                onclick="buscarFaturamento()">
            Consultar
        </button>

        <table class="table">

            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Faturamento</th>
                </tr>
            </thead>

            <tbody id="resultadoFaturamento"></tbody>

        </table>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/relatorios.js"></script>

</body>
</html>
