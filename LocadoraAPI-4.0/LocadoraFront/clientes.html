<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - Locadora Prime</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="sidebar">
    <h3>Locadora da Gabriela</h3>

    <a href="index.html">Dashboard</a>
    <a href="clientes.html">Clientes</a>
    <a href="veiculos.html">Veículos</a>
    <a href="categorias.html">Categorias</a>
    <a href="fabricantes.html">Fabricantes</a>
    <a href="alugueis.html">Aluguéis</a>
    <a href="relatorios.html">Relatórios</a>
</div>

<div class="content">

    <h1>Clientes</h1>

    <div class="card p-4 mb-4">

        <h4>Novo Cliente</h4>

        <div class="row">

            <div class="col-md-3">
                <input type="text"
                       class="form-control"
                       id="nome"
                       placeholder="Nome">
            </div>

            <div class="col-md-2">
                <input type="text"
                       class="form-control"
                       id="cpf"
                       placeholder="CPF">
            </div>

            <div class="col-md-3">
                <input type="email"
                       class="form-control"
                       id="email"
                       placeholder="Email">
            </div>

            <div class="col-md-2">
                <input type="number"
                       class="form-control"
                       id="saldo"
                       placeholder="Saldo">
            </div>

            <div class="col-md-2">
                <button class="btn btn-primary w-100"
                        onclick="salvarCliente()">
                    Salvar
                </button>
            </div>

        </div>
    </div>

    <div class="card p-4 mb-4">

        <h4>Pesquisar</h4>

        <div class="row">

            <div class="col-md-4">
                <input type="text"
                       id="filtroNome"
                       class="form-control"
                       placeholder="Nome">
            </div>

            <div class="col-md-4">
                <input type="text"
                       id="filtroCpf"
                       class="form-control"
                       placeholder="CPF">
            </div>

            <div class="col-md-2">
                <button class="btn btn-primary w-100"
                        onclick="filtrarClientes()">
                    Buscar
                </button>
            </div>

            <div class="col-md-2">
                <button class="btn btn-secondary w-100"
                        onclick="listarClientes()">
                    Limpar
                </button>
            </div>

        </div>

    </div>

    <div class="card p-4">

        <table class="table table-striped">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>Email</th>
                    <th>Saldo</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody id="tabelaClientes">

            </tbody>

        </table>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/clientes.js"></script>

</body>
</html>
